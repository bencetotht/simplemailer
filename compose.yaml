services:

  rabbitmq:
    image: rabbitmq:4-management
    hostname: rabbitmq
    container_name: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-mailer}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-change-me}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mailer
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mailer"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-RELEASE.2024-12-18T13-15-44Z}
    container_name: minio
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-change-me}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  migrate:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    command: ["bunx", "prisma", "migrate", "deploy", "--config", "packages/database/prisma/prisma.config.ts", "--schema", "packages/database/prisma/schema.prisma"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mailer
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - 3001:3000
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mailer
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-mailer}:${RABBITMQ_PASS:-change-me}@rabbitmq:5672
      - RABBITMQ_API_URL=http://rabbitmq:15672
      - RABBITMQ_API_USER=${RABBITMQ_USER:-mailer}
      - RABBITMQ_API_PASS=${RABBITMQ_PASS:-change-me}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY}
      - SECRETS_MASTER_KEY=${SECRETS_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    ports:
      - 9091:9091
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mailer
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-mailer}:${RABBITMQ_PASS:-change-me}@rabbitmq:5672
      - S3_ENDPOINT=minio
      - S3_PORT=9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-change-me}
      - CONFIG_PATH=/app/config.yaml
      - SMTP_TLS_REJECT_UNAUTHORIZED=true
      - SECRETS_MASTER_KEY=${SECRETS_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
