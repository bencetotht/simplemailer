services:

  rabbitmq:
    image: rabbitmq:4-management
    hostname: rabbitmq
    container_name: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      - RABBITMQ_DEFAULT_USER=root
      - RABBITMQ_DEFAULT_PASS=root
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mailer
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mailer"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  migrate:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    command: ["bunx", "prisma", "migrate", "deploy", "--schema", "packages/database/prisma/schema.prisma"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mailer
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - 3001:3000
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mailer
      - RABBITMQ_URL=amqp://root:root@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    ports:
      - 9091:9091
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mailer
      - RABBITMQ_URL=amqp://root:root@rabbitmq:5672
      - S3_ENDPOINT=minio
      - S3_PORT=9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - CONFIG_PATH=/app/config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
